spring:
  application:
    name: realteeth

  thymeleaf:
    cache: false

  datasource:
    url: jdbc:mysql://localhost:3306/realteeth?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: realteeth
    password: realteeth
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  data:
    redis:
      host: localhost
      port: 6379

mock-worker:
  base-url: https://dev.realteeth.ai/mock
  api-key: ${MOCK_WORKER_API_KEY:}
  candidate-name: ${MOCK_WORKER_CANDIDATE_NAME:Realteeth Candidate}
  candidate-email: ${MOCK_WORKER_CANDIDATE_EMAIL:candidate@example.com}

realteeth:
  tasks:
    worker-enabled: true
    queue-mode: redis
    queue-name: realteeth:tasks
    batch-size: 10
    retry-delays:
      - 10s
      - 30s
      - 60s

---
spring:
  config:
    activate:
      on-profile: docker

  datasource:
    url: jdbc:mysql://mysql:3306/realteeth?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC

  data:
    redis:
      host: redis
