<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Detail</title>
    <link rel="stylesheet" th:href="@{/app.css}">
</head>
<body>
<main class="layout">
    <section class="panel">
        <div class="panel-header">
            <div>
                <p class="eyebrow">Task detail</p>
                <h1 th:text="'Task #' + ${taskId}">Task</h1>
            </div>
            <a href="/tasks" class="secondary-link">Back to tasks</a>
        </div>
        <div id="task-detail" class="task-detail"></div>
    </section>
</main>

<script th:inline="javascript">
    // Thymeleaf가 서버에서 taskId 값을 HTML 안에 직접 주입한다.
    const taskId = /*[[${taskId}]]*/ 0;
    const detailElement = document.getElementById('task-detail');
    let pollTimer = null;

    // 상세 데이터를 보기 좋게 HTML로 그린다.
    function renderTask(task) {
        detailElement.innerHTML = `
            <div class="detail-grid">
                <div class="detail-item"><span>Status</span><strong class="status status-${task.status}">${task.status}</strong></div>
                <div class="detail-item"><span>External Job</span><strong>${task.externalJobId || '-'}</strong></div>
                <div class="detail-item"><span>Retry</span><strong>${task.retryCount}/${task.maxRetryCount}</strong></div>
                <div class="detail-item"><span>Next Retry</span><strong>${task.nextRetryAt ? new Date(task.nextRetryAt).toLocaleString() : '-'}</strong></div>
                <div class="detail-item full"><span>Image URL</span><strong>${task.imageUrl}</strong></div>
                <div class="detail-item full"><span>Result</span><pre>${task.result || '-'}</pre></div>
                <div class="detail-item full"><span>Last Error</span><pre>${task.lastErrorMessage || '-'}</pre></div>
            </div>
        `;
    }

    // 특정 작업 1건의 최신 상태를 가져온다.
    async function loadTask() {
        const response = await fetch(`/api/tasks/${taskId}`);
        const payload = await response.json();

        if (!response.ok) {
            detailElement.innerHTML = `<p class="error-message">${payload.message || 'Failed to load task'}</p>`;
            if (pollTimer) {
                window.clearInterval(pollTimer);
            }
            return;
        }

        renderTask(payload);
        if (payload.status === 'COMPLETED' || payload.status === 'DEAD_LETTER') {
            // 최종 상태면 더 이상 polling할 필요가 없다.
            if (pollTimer) {
                window.clearInterval(pollTimer);
            }
        }
    }

    // 페이지 진입 즉시 한 번 조회하고, 이후 2초마다 다시 조회한다.
    loadTask();
    pollTimer = window.setInterval(loadTask, 2000);
</script>
</body>
</html>
