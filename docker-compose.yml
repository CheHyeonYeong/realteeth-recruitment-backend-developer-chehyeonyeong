services:
  mysql:
    image: mysql:8.0
    container_name: realteeth-mysql
    ports:
      - "${REALTEETH_MYSQL_PORT:-3306}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: realteeth
      MYSQL_USER: realteeth
      MYSQL_PASSWORD: realteeth
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: realteeth-redis
    ports:
      - "${REALTEETH_REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: realteeth-app
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      REALTEETH_MYSQL_HOST: mysql
      REALTEETH_REDIS_HOST: redis
      MOCK_WORKER_CANDIDATE_NAME: ${MOCK_WORKER_CANDIDATE_NAME:-Realteeth Candidate}
      MOCK_WORKER_CANDIDATE_EMAIL: ${MOCK_WORKER_CANDIDATE_EMAIL:-candidate@example.com}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  mysql-data:
